<!-- Modal for gallery preview -->
<div id="imageModal" class="modal">
  <img src="" alt="">
  <div class="modal-caption"></div>
</div>

<script>
/* ────────────────────────────────────────
   Gallery modal
   ──────────────────────────────────────── */
const modal      = document.getElementById('imageModal');
const modalImg   = modal.querySelector('img');
const modalCaption = modal.querySelector('.modal-caption');

document.getElementById('gallery').addEventListener('click', e => {
  const target = e.target;

  if (!(target.tagName.toLowerCase() === 'img' ||
        target.closest('.description'))) return;   // ignore all other clicks
  const galleryItem = target.closest('.gallery-item');
  if (!galleryItem) return;                      // safety guard

  const img = galleryItem.querySelector('img');

  modalImg.src   = img.src;
  modalImg.alt   = img.alt;

  /* 4️⃣  Show the caption that lives in the same .gallery-item */
  const captionEl = galleryItem.querySelector('.description');
  if (captionEl && captionEl.textContent.trim()) {
    modalCaption.textContent = captionEl.textContent.trim();
    modalCaption.style.display = 'block';
  } else {
    modalCaption.style.display = 'none';
  }

  /* 5️⃣  Show the modal (and restart animation on repeated clicks) */
  modal.classList.add('show');
  void modal.offsetWidth;   // force re‑flow for repeat‑click animation
});

/* ────────────────────────────────────────
   Close the modal when clicking outside it
   ──────────────────────────────────────── */
modal.addEventListener('click', () => {
  modal.classList.remove('show');
  modalImg.src = '';
  modalImg.alt = '';
  modalCaption.textContent = '';
  modalCaption.style.display = 'none';
});
</script>
